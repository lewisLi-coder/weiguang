<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>微光 · 心灵陪伴</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            background:
                radial-gradient(circle at top left, rgba(255, 244, 224, 0.9), transparent 38%),
                linear-gradient(145deg, #f7f1ea 0%, #e5d8cf 100%);
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            color: #3b2e28;
        }
        .chat-container {
            max-width: 720px;
            width: 100%;
            height: 90vh;
            background: rgba(255, 252, 246, 0.92);
            border: 1px solid rgba(255, 255, 255, 0.72);
            border-radius: 34px;
            box-shadow: 0 24px 60px rgba(83, 52, 34, 0.16);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .header {
            padding: 24px 28px 16px;
            border-bottom: 1px solid #eee0d6;
            background: rgba(255, 250, 244, 0.82);
        }
        .header h1 {
            font-size: 1.8rem;
            font-weight: 650;
            letter-spacing: 0;
            color: #6d4634;
        }
        .header p {
            color: #9a7464;
            font-size: 0.88rem;
            margin-top: 6px;
        }
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 22px 24px;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .message {
            max-width: min(86%, 560px);
            padding: 12px 17px;
            border-radius: 22px;
            font-size: 0.96rem;
            line-height: 1.55;
            animation: fadeIn 0.18s ease;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .user {
            align-self: flex-end;
            background: #cda890;
            color: #2d211b;
            border-bottom-right-radius: 7px;
        }
        .bot {
            align-self: flex-start;
            background: #fffaf4;
            color: #44352e;
            border: 1px solid #f0e4d9;
            border-bottom-left-radius: 7px;
            box-shadow: 0 4px 16px rgba(82, 54, 34, 0.05);
        }
        .typing {
            align-self: flex-start;
            background: #efe2d7;
            padding: 10px 17px;
            border-radius: 22px;
            font-size: 0.86rem;
            color: #7d5e4e;
        }
        .input-area {
            padding: 16px 20px 22px;
            background: #fff9f2;
            border-top: 1px solid #eeded4;
            display: grid;
            grid-template-columns: 46px 1fr 52px;
            gap: 10px;
            align-items: end;
        }
        textarea {
            width: 100%;
            min-height: 46px;
            max-height: 120px;
            border: 1px solid #e2d2c8;
            border-radius: 23px;
            padding: 12px 16px;
            font-family: inherit;
            font-size: 0.94rem;
            resize: none;
            background: white;
            color: #332722;
            outline: none;
            transition: 0.2s;
        }
        textarea:focus {
            border-color: #bd7657;
            box-shadow: 0 0 0 3px #f6dfd2;
        }
        button {
            border: none;
            border-radius: 999px;
            height: 46px;
            min-width: 46px;
            color: white;
            font-size: 1.05rem;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 6px 14px rgba(122, 75, 50, 0.15);
        }
        button:hover { transform: translateY(-1px); }
        button:disabled {
            opacity: 0.55;
            cursor: not-allowed;
            transform: none;
        }
        #sendBtn { background: #a96445; }
        #sendBtn:hover { background: #92563b; }
        #voiceBtn {
            background: #7f8f74;
            font-size: 1rem;
        }
        #voiceBtn.recording {
            background: #b65d4d;
            box-shadow: 0 0 0 5px rgba(182, 93, 77, 0.16);
        }
        footer {
            font-size: 0.68rem;
            text-align: center;
            padding: 10px 16px;
            color: #a98f80;
            background: #fff9f2;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @media (max-width: 560px) {
            body { padding: 0; }
            .chat-container {
                height: 100vh;
                border-radius: 0;
            }
            .header { padding: 20px 16px 14px; }
            .messages { padding: 18px 16px; }
            .input-area { padding: 12px 12px 18px; }
        }
    </style>
</head>
<body>
<div class="chat-container">
    <div class="header">
        <h1 data-i18n="title">微光</h1>
        <p data-i18n="subtitle">一个安静的朋友 · 随时倾听你</p>
    </div>
    <div class="messages" id="messages"></div>
    <div class="input-area">
        <button id="voiceBtn" type="button" title="语音输入" aria-label="语音输入">🎙</button>
        <textarea id="userInput" rows="1" placeholder="说说你的心情..." data-i18n-placeholder="placeholder"></textarea>
        <button id="sendBtn" type="button" title="发送" aria-label="发送">➤</button>
    </div>
    <footer data-i18n="footer">微光是情感陪伴 AI · 不能替代专业医疗或危机干预</footer>
</div>

<script>
    const copy = {
        zh: {
            title: "微光",
            subtitle: "一个安静的朋友 · 随时倾听你",
            placeholder: "说说你的心情...",
            footer: "微光是情感陪伴 AI · 不能替代专业医疗或危机干预",
            starter: "慢慢呼吸，我在这里。你可以随便说些什么，开心的、烦心的都好。",
            listening: "微光正在倾听...",
            historyError: "读取历史记录失败：",
            chatError: "我这里暂时没有连上后端：",
            recording: "正在听你说话，再点一次结束。",
            asrError: "我没能听清这段语音。请检查浏览器是否支持语音识别，并允许麦克风权限。",
            unsupportedAudio: "这个浏览器暂时不支持录音，可以先用文字和我说。",
            micError: "麦克风没有准备好。请允许浏览器使用麦克风后再试一次。"
        },
        en: {
            title: "Weiguang",
            subtitle: "A quiet companion · Here to listen",
            placeholder: "Share what is on your mind...",
            footer: "Weiguang is an emotional companion AI · Not a replacement for professional care or crisis support",
            starter: "Take a slow breath. I am here with you. You can share whatever is on your mind.",
            listening: "Weiguang is listening...",
            historyError: "Failed to load history:",
            chatError: "I could not reach the backend:",
            recording: "Listening. Tap again to stop.",
            asrError: "I could not understand that speech. Please check browser speech recognition support and microphone permission.",
            unsupportedAudio: "This browser does not support speech recognition. You can still type to me.",
            micError: "The microphone is not ready. Please allow microphone access and try again."
        }
    };

    const messagesContainer = document.getElementById("messages");
    const userInput = document.getElementById("userInput");
    const sendBtn = document.getElementById("sendBtn");
    const voiceBtn = document.getElementById("voiceBtn");

    let locale = "zh";
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition = null;
    let isRecognizing = false;

    function t(key) {
        return copy[locale][key] || copy.zh[key] || key;
    }

    function starterMessage() {
        return { role: "assistant", content: t("starter") };
    }

    function applyLocale() {
        document.documentElement.lang = locale === "en" ? "en" : "zh-CN";
        document.querySelectorAll("[data-i18n]").forEach((element) => {
            element.innerText = t(element.dataset.i18n);
        });
        document.querySelectorAll("[data-i18n-placeholder]").forEach((element) => {
            element.placeholder = t(element.dataset.i18nPlaceholder);
        });
    }

    async function loadLocale() {
        try {
            const response = await fetch("/api/locale");
            if (!response.ok) throw new Error("locale request failed");
            const data = await response.json();
            locale = data.locale === "en" ? "en" : "zh";
        } catch (error) {
            console.error("Failed to load locale:", error);
        }
        applyLocale();
    }

    function getClientId() {
        let clientId = localStorage.getItem("warmChatClientId");
        if (!clientId) {
            clientId = crypto.randomUUID ? crypto.randomUUID() : `${Date.now()}-${Math.random().toString(16).slice(2)}`;
            localStorage.setItem("warmChatClientId", clientId);
        }
        return clientId;
    }

    function addMessage(text, isUser) {
        const div = document.createElement("div");
        div.className = `message ${isUser ? "user" : "bot"}`;
        div.innerText = text;
        messagesContainer.appendChild(div);
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
        return div;
    }

    function clearMessages() {
        messagesContainer.innerHTML = "";
    }

    function showTyping(text = t("listening")) {
        removeTyping();
        const typingDiv = document.createElement("div");
        typingDiv.className = "typing";
        typingDiv.innerText = text;
        typingDiv.id = "typingIndicator";
        messagesContainer.appendChild(typingDiv);
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }

    function removeTyping() {
        const typingDiv = document.getElementById("typingIndicator");
        if (typingDiv) typingDiv.remove();
    }

    function renderHistory(messages) {
        clearMessages();
        const visibleMessages = messages && messages.length ? messages : [starterMessage()];
        visibleMessages.forEach((message) => {
            addMessage(message.content, message.role === "user");
        });
    }

    async function loadHistory() {
        try {
            const response = await fetch(`/api/history?clientId=${encodeURIComponent(getClientId())}`);
            if (!response.ok) throw new Error("history request failed");
            const data = await response.json();
            renderHistory(data.messages);
        } catch (error) {
            console.error(t("historyError"), error);
            renderHistory([starterMessage()]);
        }
    }

    async function getBotReply(userMessage) {
        const response = await fetch("/api/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message: userMessage, clientId: getClientId(), locale })
        });
        const data = await response.json();
        if (!response.ok) {
            throw new Error(data.error || "聊天请求失败");
        }
        return data.reply;
    }

    async function handleSend() {
        const text = userInput.value.trim();
        if (!text || sendBtn.disabled) return;

        userInput.value = "";
        resizeInput();
        addMessage(text, true);
        showTyping();
        sendBtn.disabled = true;

        try {
            const botReply = await getBotReply(text);
            removeTyping();
            addMessage(botReply, false);
        } catch (error) {
            console.error("聊天请求错误：", error);
            removeTyping();
            addMessage(`${t("chatError")}${error.message}`, false);
        } finally {
            sendBtn.disabled = false;
            userInput.focus();
        }
    }

    function createRecognition() {
        const instance = new SpeechRecognition();
        instance.lang = locale === "en" ? "en-US" : "zh-CN";
        instance.interimResults = true;
        instance.continuous = false;

        let finalText = "";

        instance.onresult = (event) => {
            let interimText = "";
            for (let i = event.resultIndex; i < event.results.length; i++) {
                const transcript = event.results[i][0].transcript;
                if (event.results[i].isFinal) {
                    finalText += transcript;
                } else {
                    interimText += transcript;
                }
            }
            userInput.value = `${finalText}${interimText}`.trim();
            resizeInput();
        };

        instance.onerror = (event) => {
            console.error("Speech recognition error:", event.error);
            addMessage(t("asrError"), false);
        };

        instance.onend = () => {
            isRecognizing = false;
            voiceBtn.classList.remove("recording");
            voiceBtn.innerText = "🎙";
            removeTyping();
            userInput.focus();
        };

        return instance;
    }

    function startRecording() {
        recognition = createRecognition();
        isRecognizing = true;
        voiceBtn.classList.add("recording");
        voiceBtn.innerText = "■";
        showTyping(t("recording"));
        recognition.start();
    }

    function stopRecording() {
        if (recognition) {
            recognition.stop();
        }
    }

    function toggleRecording() {
        if (!SpeechRecognition) {
            addMessage(t("unsupportedAudio"), false);
            return;
        }

        try {
            if (isRecognizing) {
                stopRecording();
            } else {
                startRecording();
            }
        } catch (error) {
            console.error("Speech recognition start error:", error);
            removeTyping();
            voiceBtn.classList.remove("recording");
            voiceBtn.innerText = "🎙";
            addMessage(t("micError"), false);
        }
    }

    function resizeInput() {
        userInput.style.height = "auto";
        userInput.style.height = Math.min(120, userInput.scrollHeight) + "px";
    }

    sendBtn.addEventListener("click", handleSend);
    voiceBtn.addEventListener("click", toggleRecording);
    userInput.addEventListener("keypress", (event) => {
        if (event.key === "Enter" && !event.shiftKey) {
            event.preventDefault();
            handleSend();
        }
    });
    userInput.addEventListener("input", resizeInput);

    loadLocale().then(loadHistory);
</script>
</body>
</html>
